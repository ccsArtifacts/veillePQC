sources:
  - name: NIST PQC Project News
    type: webpage
    url: https://csrc.nist.gov/Projects/post-quantum-cryptography/news
    include_patterns: ["pqc", "news", "standard", "draft"]
    max_items: 15
    tags: [official, standards, news]

  - name: CISA PQC Resources
    type: webpage
    url: https://www.cisa.gov/resources-tools/resources/product-categories-technologies-use-post-quantum-cryptography-standards
    include_patterns: ["post-quantum", "cryptography", "product", "technology"]
    max_items: 10
    tags: [official, inventory, procurement]

  - name: ENISA Cryptography
    type: webpage
    url: https://www.enisa.europa.eu/topics/digital-identity-and-data-protection/cryptography
    include_patterns: ["post-quantum", "cryptography", "study", "integration"]
    max_items: 12
    tags: [official, eu, guidance]

  - name: ETSI Quantum Safe
    type: webpage
    url: https://www.etsi.org/technologies/quantum-safe-cryptography
    include_patterns: ["quantum", "safe", "cryptography", "migration", "hybrid"]
    max_items: 12
    tags: [official, standards, eu]

  - name: IETF Datatracker PQC
    type: webpage
    url: https://datatracker.ietf.org/doc/search/?name=&activedrafts=on&rfcs=on&sort=&stream=all&wg=&area=&author=&keyword=post-quantum
    include_patterns: ["draft", "rfc", "post-quantum", "mlkem", "hybrid"]
    max_items: 20
    tags: [official, protocols, ietf]

  - name: PQCA Blog
    type: webpage
    url: https://pqca.org/blog/
    include_patterns: ["liboqs", "pqc", "post-quantum", "mlkem", "ml-dsa"]
    max_items: 10
    tags: [ecosystem, implementation, open-source]

  - name: NIST CSRC News RSS
    type: rss
    url: https://csrc.nist.gov/feeds/all
    tags: [official, standards, nist]

  - name: arXiv Cryptography PQC
    type: rss
    url: https://rss.arxiv.org/rss/cs.CR
    tags: [research, papers]

  - name: GitHub Releases liboqs
    type: rss
    url: https://github.com/open-quantum-safe/liboqs/releases.atom
    tags: [implementation, open-source, releases]

  - name: GitHub Releases oqs-provider
    type: rss
    url: https://github.com/open-quantum-safe/oqs-provider/releases.atom
    tags: [implementation, open-source, releases]
